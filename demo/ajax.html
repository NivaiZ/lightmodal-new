<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LightModal AJAX demo</title>
  </head>
  <body>
    <main style="padding: 24px; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
      <section class="lm-ajax-fragment">
        <h2 style="margin: 0 0 12px">AJAX (HTML)</h2>
        <p style="margin: 0 0 12px">
          Этот фрагмент загружен через <code>fetch()</code> и вставлен в модалку.
        </p>
        <ul style="margin: 0; padding-left: 18px">
          <li>Работает <strong>ajaxSelector</strong> (если задан)</li>
          <li>В ответе автоматически удаляются <code>&lt;script&gt;</code>, <code>&lt;style&gt;</code>, <code>on*</code> и <code>javascript:</code></li>
        </ul>
        <div style="margin-top: 16px; padding: 12px; border: 1px solid #e5e7eb; border-radius: 10px; background: #fafafa">
          <strong>Пример “карточки”</strong>
          <div style="margin-top: 8px; display: grid; gap: 6px">
            <div>Статус: <span style="color: #16a34a">OK</span></div>
            <div>Время: <span id="time"></span></div>
          </div>
        </div>
      </section>

      <script>
        document.getElementById("time").textContent = new Date().toLocaleString();
      </script>
    </main>
  </body>
</html>
